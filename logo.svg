<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#00e5a0" stroke-width="0.3" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="14" fill="#0a0c0f"/>
  <rect width="120" height="120" rx="14" fill="url(#grid)"/>

  <!-- Border -->
  <rect x="1" y="1" width="118" height="118" rx="13" fill="none" stroke="#00e5a0" stroke-width="1.5"/>
  <rect x="5" y="5" width="110" height="110" rx="10" fill="none" stroke="#00e5a0" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner accents -->
  <polyline points="1,18 1,8 11,8" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="109,8 119,8 119,18" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="1,102 1,112 11,112" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="109,112 119,112 119,102" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PG Initials -->
  <text x="60" y="75"
    font-family="'Space Mono', 'Courier New', monospace"
    font-size="46"
    font-weight="700"
    fill="#00e5a0"
    text-anchor="middle"
    letter-spacing="-2">PG</text>

  <!-- Underline -->
  <line x1="28" y1="84" x2="92" y2="84" stroke="#00e5a0" stroke-width="1" opacity="0.35"/>

  <!-- Tagline -->
  <text x="60" y="98"
    font-family="'Space Mono', monospace"
    font-size="6.5"
    fill="#00e5a0"
    text-anchor="middle"
    letter-spacing="2.5"
    opacity="0.55">DATA ENG</text>
</svg>
